<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R7 AROMA | Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #10b981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
            --dark-bg: #050505;
            --card-bg: #0d0d0d;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: #e0e0e0;
        }

        .font-logo {
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 0.3em;
        }

        .neon-text {
            color: var(--emerald);
            text-shadow: 0 0 10px var(--emerald-glow);
        }

        .btn-emerald {
            background: var(--emerald);
            color: black;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-emerald:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--emerald);
        }

        .glass-panel {
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        .upload-zone {
            border: 2px dashed rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.02);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--emerald); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Login Section -->
    <div id="login-section" class="fixed inset-0 z-[200] flex items-center justify-center bg-black">
        <div class="bg-[#0f0f0f] w-full max-w-sm rounded-3xl p-8 border border-emerald-500/30 text-center shadow-2xl">
            <h1 class="font-logo text-xl neon-text mb-2">R7 ADMIN</h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-widest mb-8">Acceso Restringido</p>
            <input type="password" id="admin-pass" class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-emerald-500 text-white mb-6" placeholder="******">
            <button onclick="verifyAccess()" class="w-full btn-emerald py-4 rounded-xl uppercase text-xs tracking-widest">Entrar al Sistema</button>
            <a href="index.html" class="block mt-6 text-gray-600 text-[10px] uppercase tracking-widest hover:text-emerald-500 transition-colors">Volver a la Tienda</a>
        </div>
    </div>

    <!-- Admin Dashboard (Hidden by default) -->
    <div id="admin-dashboard" class="hidden">
        <!-- Header -->
        <nav class="glass-panel sticky top-0 z-50 px-6 py-4 mb-8">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="font-logo text-xl font-bold neon-text uppercase">PANEL DE CONTROL</h1>
                    <span class="text-[8px] uppercase tracking-[0.6em] text-gray-500 mt-1">Gestión de Inventario R7</span>
                </div>
                <div class="flex gap-4">
                    <a href="index.html" class="text-gray-500 border border-white/10 px-4 py-2 rounded-full text-[10px] uppercase tracking-widest hover:bg-white/5 transition-all flex items-center">Tienda</a>
                    <button onclick="openProductModal()" class="btn-emerald px-6 py-2 rounded-full text-[10px] uppercase tracking-widest">Nueva Fragancia</button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-6 pb-20">
            <!-- Stats Summary -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="glass-panel p-8 rounded-[32px]">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Total Fragancias</p>
                    <h2 id="total-count" class="text-4xl font-light text-white">0</h2>
                </div>
                <div class="glass-panel p-8 rounded-[32px]">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Sin Stock (Agotados)</p>
                    <h2 id="out-of-stock-count" class="text-4xl font-light text-red-500">0</h2>
                </div>
                <div class="glass-panel p-8 rounded-[32px]">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Valor Inventario</p>
                    <h2 id="total-value" class="text-4xl font-light text-emerald-500">$0.00</h2>
                </div>
            </div>

            <!-- Products Table -->
            <div class="glass-panel rounded-[40px] overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[600px] md:min-w-full">
                        <thead class="bg-emerald-500/5 border-b border-white/5">
                            <tr>
                                <th class="px-4 md:px-8 py-6 text-[10px] uppercase tracking-widest text-emerald-500">Imagen</th>
                                <th class="px-4 md:px-8 py-6 text-[10px] uppercase tracking-widest text-emerald-500">Fragancia</th>
                                <th class="px-4 md:px-8 py-6 text-[10px] uppercase tracking-widest text-emerald-500">Precio</th>
                                <th class="px-4 md:px-8 py-6 text-[10px] uppercase tracking-widest text-emerald-500">Stock</th>
                                <th class="px-4 md:px-8 py-6 text-[10px] uppercase tracking-widest text-emerald-500 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admin-product-list" class="divide-y divide-white/5">
                            <!-- Productos aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Registro/Edición -->
    <div id="product-modal" class="fixed inset-0 z-[120] flex items-center justify-center hidden p-4 bg-black/95">
        <div class="bg-[#0f0f0f] w-full max-w-lg rounded-[40px] p-8 border border-emerald-500/20 shadow-2xl relative">
            <h3 id="modal-title" class="text-2xl font-bold tracking-tight neon-text uppercase mb-8">Nueva Fragancia</h3>
            <form id="perfume-form" onsubmit="saveProduct(event)" class="space-y-6">
                <input type="hidden" id="p-id">
                <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="upload-zone h-48 rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative border border-white/5">
                    <div id="preview-text" class="text-center text-gray-500">
                        <svg class="h-8 w-8 mx-auto mb-2 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4" />
                        </svg>
                        <p class="text-[10px] uppercase tracking-widest">Cambiar Imagen</p>
                    </div>
                    <img id="img-preview" src="" class="absolute inset-0 w-full h-full object-contain hidden p-6">
                </div>
                <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(this)">
                
                <input required id="p-name" type="text" placeholder="NOMBRE DEL PERFUME" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 text-white placeholder:text-gray-700">
                <div class="flex gap-4">
                    <input required id="p-price" type="number" step="0.01" placeholder="PRECIO ($)" class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 text-white placeholder:text-gray-700">
                    <input required id="p-stock" type="number" placeholder="STOCK" class="w-1/3 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 text-white placeholder:text-gray-700">
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal('product-modal')" class="flex-1 py-4 text-gray-500 text-xs font-bold tracking-widest uppercase">Cancelar</button>
                    <button type="submit" id="btn-submit" class="flex-1 btn-emerald py-4 rounded-2xl text-xs uppercase tracking-widest">Publicar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://esmvrmngmrcdofdckzik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzbXZybW5nbXJjZG9mZGNremlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzA0ODEsImV4cCI6MjA4OTEwNjQ4MX0.AeoL588TmcqLQpiAbQorMB-RuwG0t3odrNBaKoMB7PY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_PASS = "203031";
        let products = [];
        let imageData = '';

        function verifyAccess() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === ADMIN_PASS) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                fetchProducts();
            } else {
                alert("ACCESO DENEGADO");
                document.getElementById('admin-pass').value = '';
            }
        }

        async function fetchProducts() {
            try {
                const { data, error } = await supabaseClient
                    .from('perfumes')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) {
                    console.error('Error fetchProducts:', error);
                    alert("Error al obtener productos: " + error.message);
                    products = [];
                } else {
                    products = data || [];
                }
                render();
                updateStats();
            } catch (err) {
                console.error('Error inesperado:', err);
                alert("Ocurrió un error inesperado al cargar los productos.");
            }
        }

        function render() {
            const list = document.getElementById('admin-product-list');
            if (!products || products.length === 0) {
                list.innerHTML = `<tr><td colspan="5" class="px-8 py-20 text-center text-gray-500 uppercase tracking-widest text-xs">No se encontraron fragancias en el inventario</td></tr>`;
                return;
            }

            list.innerHTML = products.map(p => {
                const idShort = p.id ? (typeof p.id === 'string' ? p.id.split('-')[0] : p.id) : 'N/A';
                const name = p.name || 'SIN NOMBRE';
                const price = p.price || 0;
                const stock = p.stock || 0;
                const image = p.image || 'https://via.placeholder.com/150?text=No+Image';

                return `
                <tr class="hover:bg-white/[0.02] transition-colors">
                    <td class="px-4 md:px-8 py-4">
                        <img src="${image}" class="h-16 w-16 object-contain bg-white/5 rounded-xl" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                    </td>
                    <td class="px-4 md:px-8 py-4">
                        <p class="font-bold text-white uppercase text-sm md:text-base">${name}</p>
                        <p class="text-[10px] text-gray-500 font-mono">ID: ${idShort}</p>
                    </td>
                    <td class="px-4 md:px-8 py-4 text-emerald-500 font-light">$${price}</td>
                    <td class="px-4 md:px-8 py-4">
                        <span class="${stock <= 0 ? 'text-red-500 font-bold' : 'text-gray-400'}">
                            ${stock} Uds.
                        </span>
                    </td>
                    <td class="px-4 md:px-8 py-4 text-right">
                        <div class="flex justify-end gap-3">
                            <button onclick="openProductModal('${p.id}')" class="p-2 hover:bg-emerald-500/20 rounded-lg text-emerald-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                            </button>
                            <button onclick="deleteProduct('${p.id}')" class="p-2 hover:bg-red-500/20 rounded-lg text-red-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        function updateStats() {
            document.getElementById('total-count').innerText = products.length;
            document.getElementById('out-of-stock-count').innerText = products.filter(p => p.stock <= 0).length;
            const totalValue = products.reduce((acc, p) => acc + (parseFloat(p.price) * p.stock), 0);
            document.getElementById('total-value').innerText = "$" + totalValue.toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function openProductModal(id = null) {
            resetForm();
            if (id) {
                const p = products.find(prod => prod.id === id);
                document.getElementById('modal-title').innerText = "Editar Fragancia";
                document.getElementById('btn-submit').innerText = "Guardar Cambios";
                document.getElementById('p-id').value = p.id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-stock').value = p.stock;
                document.getElementById('img-preview').src = p.image;
                document.getElementById('img-preview').classList.remove('hidden');
                document.getElementById('preview-text').classList.add('hidden');
                imageData = p.image;
            } else {
                document.getElementById('modal-title').innerText = "Nueva Fragancia";
                document.getElementById('btn-submit').innerText = "Publicar";
            }
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    imageData = e.target.result;
                    document.getElementById('img-preview').src = e.target.result;
                    document.getElementById('img-preview').classList.remove('hidden');
                    document.getElementById('preview-text').classList.add('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProduct(e) {
            e.preventDefault();
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            const productId = document.getElementById('p-id').value;
            
            if(!file && !productId) return alert("Sube una imagen");
            
            let finalImageUrl = imageData; // Por defecto mantenemos la actual (para editar)

            try {
                // 1. SI HAY UN ARCHIVO NUEVO, SUBIRLO AL STORAGE
                if (file) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Math.random()}.${fileExt}`;
                    const filePath = `${fileName}`;

                    const { data: uploadData, error: uploadError } = await supabaseClient
                        .storage
                        .from('perfumes')
                        .upload(filePath, file);

                    if (uploadError) throw uploadError;

                    // Obtener la URL pública del archivo subido
                    const { data: urlData } = supabaseClient
                        .storage
                        .from('perfumes')
                        .getPublicUrl(filePath);
                    
                    finalImageUrl = urlData.publicUrl;
                }

                // 2. GUARDAR LOS DATOS EN LA TABLA
                const productData = {
                    name: document.getElementById('p-name').value.toUpperCase(),
                    price: parseFloat(document.getElementById('p-price').value),
                    stock: parseInt(document.getElementById('p-stock').value),
                    image: finalImageUrl // Ahora guardamos el LINK, no el código gigante
                };

                let error;
                if (productId) {
                    const result = await supabaseClient.from('perfumes').update(productData).eq('id', productId);
                    error = result.error;
                } else {
                    const result = await supabaseClient.from('perfumes').insert([productData]);
                    error = result.error;
                }

                if (error) throw error;

                alert("¡Éxito! Producto guardado correctamente.");
                fetchProducts();
                closeModal('product-modal');
                resetForm();

            } catch (err) {
                console.error("Error completo:", err);
                alert("Error: " + err.message);
            }
        }

        function resetForm() {
            document.getElementById('perfume-form').reset();
            document.getElementById('p-id').value = '';
            document.getElementById('img-preview').classList.add('hidden');
            document.getElementById('preview-text').classList.remove('hidden');
            imageData = '';
        }

        async function deleteProduct(id) {
            if(!confirm("¿Deseas eliminar permanentemente esta fragancia y su imagen?")) return;
            
            try {
                // 1. Encontrar el producto para obtener la URL de la imagen
                const product = products.find(p => p.id === id);
                
                if (product && product.image) {
                    // 2. Extraer el nombre del archivo de la URL pública
                    // Las URLs de Supabase suelen ser: .../storage/v1/object/public/perfumes/nombre-archivo.jpg
                    const urlParts = product.image.split('/');
                    const fileName = urlParts[urlParts.length - 1];

                    // 3. Borrar la imagen del Storage (Bucket)
                    // Solo intentamos borrar si no es un placeholder o link externo
                    if (!product.image.includes('placeholder') && !product.image.startsWith('data:')) {
                        const { error: storageError } = await supabaseClient
                            .storage
                            .from('perfumes')
                            .remove([fileName]);
                        
                        if (storageError) console.warn("No se pudo borrar la imagen del storage:", storageError.message);
                    }
                }

                // 4. Borrar el registro de la tabla
                const { error } = await supabaseClient.from('perfumes').delete().eq('id', id);
                
                if (error) throw error;
                
                alert("FRAGANCIA ELIMINADA");
                fetchProducts();

            } catch (err) {
                console.error("Error al eliminar:", err);
                alert("Error al borrar: " + err.message);
            }
        }
    </script>
</body>
</html>
